# Valida que el schema Drizzle + parches docs/sql/manifest.txt apliquen contra Postgres limpio.
name: Schema local

on:
  push:
    paths:
      - 'packages/database/**'
      - 'docs/sql/**'
      - 'scripts/db-schema-local.sh'
      - 'scripts/apply-docs-sql.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/schema-local.yml'
  pull_request:
    paths:
      - 'packages/database/**'
      - 'docs/sql/**'
      - 'scripts/db-schema-local.sh'
      - 'scripts/apply-docs-sql.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/schema-local.yml'

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/propieya

jobs:
  schema-local:
    name: db:schema:local
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: propieya
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d propieya"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply schema (push + SQL manifest)
        run: pnpm db:schema:local
